<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>STUMBLE PRO v2</title>
<link rel="stylesheet" href="css/style.css">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
</head>
<body>

<header class="topbar">
  <h1>🏆 STUMBLE PRO</h1>
</header>

<aside class="sidebar">
  <ul>
    <li>Dashboard</li>
    <li>Players</li>
    <li>Tournaments</li>
    <li>Matches</li>
    <li>Seasons</li>
    <li>Achievements</li>
    <li>Statistics</li>
    <li>Hall of Fame</li>
    <li>Admin</li>
  </ul>
</aside>

<main>
  <section id="dashboard">
    <h2>Dashboard</h2>
    <div id="stats"></div>
  </section>

  <section id="players">
    <h2>Players</h2>
    <div id="playersGrid"></div>
  </section>

  <section id="tournaments">
    <h2>Tournaments</h2>
    <div id="tournamentsGrid"></div>
  </section>

  <section id="matches">
    <h2>Matches</h2>
    <div id="matchesTable"></div>
  </section>

  <section id="seasons">
    <h2>Seasons</h2>
  </section>

  <section id="achievements">
    <h2>Achievements</h2>
  </section>

  <section id="statistics">
    <h2>Statistics</h2>
    <canvas id="mainChart"></canvas>
  </section>

  <section id="halloffame">
    <h2>Hall of Fame</h2>
  </section>

  <section id="admin">
    <h2>Admin Panel</h2>
  </section>
</main>

<script src="js/app.js"></script>
</body>
</html>
